; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:teensy41]
platform  = teensy
board     = teensy41
framework = arduino

; === Clock ===
board_build.f_cpu = 600000000L   ; 600 MHz penuh

; === Serial Monitor ===
monitor_speed = 115200            ; FIX: 1152000 bukan baud valid standar

; === Optimasi Compiler ===
build_flags =
    -O2                           ; Optimasi agresif tapi stabil
    -ffast-math                   ; Relax IEEE-754 → PID loop ~2x lebih cepat
    -funroll-loops                ; Unroll loop kecil
    -mcpu=cortex-m7               ; FIX: -march=cortex-m7 SALAH, pakai -mcpu
    -mfpu=fpv5-d16                ; FPU double-precision Cortex-M7
    -mfloat-abi=hard              ; WAJIB: pakai hardware FPU, bukan software emulation

; === Library ===
lib_deps =
    bolderflight/Bolder Flight Systems SBUS@^8.1.4
    zerokol/eFLL@^1.4.1
    duracopter/MAVLink v2 C library@^2.0